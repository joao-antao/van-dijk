<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Van Dijk Ad Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Van Dijk</h1>
      <p class="subtitle">Ad Blocker</p>
    </div>
    
    <div class="stats-main">
      <div class="stat-group">
        <h3 class="stat-group-title ads">Ads Blocked</h3>
        <div class="stat-row">
          <div class="stat-item ads">
            <span class="stat-label">Session</span>
            <span class="stat-value" id="sessionAds">0</span>
          </div>
          <div class="stat-item ads">
            <span class="stat-label">All Time</span>
            <span class="stat-value" id="totalAds">0</span>
          </div>
        </div>
      </div>
      <div class="stat-group">
        <h3 class="stat-group-title trackers">Trackers Blocked</h3>
        <div class="stat-row">
          <div class="stat-item trackers">
            <span class="stat-label">Session</span>
            <span class="stat-value" id="sessionTrackers">0</span>
          </div>
          <div class="stat-item trackers">
            <span class="stat-label">All Time</span>
            <span class="stat-value" id="totalTrackers">0</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="details-section">
      <h2 class="details-header">Blocked by Site</h2>
      <div id="siteList" class="site-list">
        <p class="no-data">No sites visited yet</p>
      </div>
    </div>
    
    <div class="details-section">
      <h2 class="details-header">Recent Blocks</h2>
      <div id="recentBlocksList" class="recent-blocks-list">
        <p class="no-data">No blocks yet</p>
      </div>
    </div>
    
    <div class="actions">
      <button id="resetBtn" class="btn">Reset Session Stats</button>
    </div>
    
    <div class="footer">
      <p class="version">Version 1.0.0</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
