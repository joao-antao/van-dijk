<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eef7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#gradient)"/>
  
  <!-- Defender Shield (van Dijk = defender) -->
  <path d="M 24 8 
           C 24 8, 16 10, 16 16
           L 16 24
           C 16 32, 24 38, 24 38
           C 24 38, 32 32, 32 24
           L 32 16
           C 32 10, 24 8, 24 8 Z" 
        fill="url(#shieldGradient)" 
        stroke="rgba(255,255,255,0.5)" 
        stroke-width="1"/>
  
  <!-- Subtle shine on shield -->
  <path d="M 20 12 
           C 20 12, 18 13, 18 16
           L 18 20
           C 18 22, 19 24, 20 25" 
        fill="none" 
        stroke="rgba(255,255,255,0.4)" 
        stroke-width="1.5" 
        stroke-linecap="round"/>
  
  <!-- Outer circle border -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>
